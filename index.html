<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Under Update</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .name {
      color: red;
      font-weight: bold;
    }

    p {
      font-size: 20px;
      margin: 10px 0;
    }

    .emoji {
      font-size: 40px;
      margin-top: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1><span class="name">Yash Bellare</span></h1>
    <p>Cooking something!! 👨‍🍳🔥</p>
    <p class="emoji">🚧 Site Under Update 🚧</p>
  </div>
</body>
</html>
